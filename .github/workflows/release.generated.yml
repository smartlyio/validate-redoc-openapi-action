name: Build and release the action

on:
  push:
    branches: [main]

jobs:
  test_action:
    runs-on: ubuntu-latest
    name: Test OpenAPI spec validation
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20.x
      - name: yarn install
        run: yarn install
      - name: Build distribution
        run: yarn clean && yarn dist
      - name: Validate valid openapi file
        uses: ./
        with:
          openapi-file: 'fixtures/valid_openapi.yml'

  test_unit:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20.x
      - name: yarn install
        run: yarn install
      - name: yarn test
        run: yarn test

  release:
    runs-on: ubuntu-20.04
    name: "Build and release action"
    needs: [test_action, test_unit]
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Configure git
        uses: smartlyio/github-actions@git-init-userinfo-v1
      - name: Release flow
        uses: smartlyio/github-actions@release-action-node-v1
        with:
          use_yarn: true
          token: "${{ secrets.GITHUB_TOKEN }}"
